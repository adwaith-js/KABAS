<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1d4ed8" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="120" ry="120" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Shine overlay -->
  <rect width="512" height="256" rx="120" ry="120" fill="url(#shine)"/>

  <!-- Kanban columns (3 bars styled as a board) -->
  <!-- Left column - short bar (To-Do) -->
  <rect x="90" y="290" width="88" height="148" rx="14" fill="white" opacity="0.35"/>
  <rect x="90" y="200" width="88" height="76" rx="14" fill="white" opacity="0.9"/>

  <!-- Middle column - tall bar (In Progress) -->
  <rect x="212" y="180" width="88" height="258" rx="14" fill="white" opacity="0.35"/>
  <rect x="212" y="180" width="88" height="160" rx="14" fill="white" opacity="0.9"/>

  <!-- Right column - medium bar (Done) -->
  <rect x="334" y="240" width="88" height="198" rx="14" fill="white" opacity="0.35"/>
  <rect x="334" y="240" width="88" height="110" rx="14" fill="white" opacity="0.9"/>

  <!-- Top tick dots (column headers) -->
  <circle cx="134" cy="170" r="12" fill="white" opacity="0.7"/>
  <circle cx="256" cy="150" r="12" fill="white" opacity="0.7"/>
  <circle cx="378" cy="210" r="12" fill="white" opacity="0.7"/>
</svg>
